<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lulu & Bagel">
  <meta name="theme-color" content="#0d0d0d">
  <title>Loading…</title>

  <style>
    /* =============================================
       CSS CUSTOM PROPERTIES (mirrors CONFIG object)
       ============================================= */
    :root {
      --bg-color: #0d0d0d;
      --panel-max-width: 720px;
      --panel-gap: 20px;
      --text-primary: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.75);
      --overlay-opacity: 0.45;
    }

    /* =============================================
       RESET & BASE
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: Georgia, 'Times New Roman', serif;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* =============================================
       BACK BUTTON
       ============================================= */
    #back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background-color: rgba(0, 0, 0, 0.55);
      color: #ffffff;
      font-size: 1.25rem;
      text-decoration: none;
      border-radius: 50%;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background-color 0.2s ease, transform 0.15s ease;
      line-height: 1;
    }

    #back-btn:hover {
      background-color: rgba(0, 0, 0, 0.8);
      transform: translateX(-2px);
    }

    /* =============================================
       OPENING TITLE SCREEN
       ============================================= */
    #title-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      /* cover src set dynamically via JS */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: var(--bg-color);
    }

    #title-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, var(--overlay-opacity));
      z-index: 0;
    }

    .title-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
    }

    .title-main {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: bold;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
    }

    .title-sub {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-style: italic;
      color: var(--text-soft);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
    }

    .begin-btn {
      margin-top: 12px;
      padding: 14px 36px;
      font-family: Georgia, serif;
      font-size: 1.05rem;
      font-style: italic;
      color: #0d0d0d;
      background-color: rgba(255, 255, 255, 0.92);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      transition: background-color 0.2s ease, transform 0.15s ease;
    }

    .begin-btn:hover {
      background-color: #ffffff;
      transform: translateY(-2px);
    }

    .begin-btn:active {
      transform: translateY(0);
    }

    /* =============================================
       PANEL SECTION
       ============================================= */
    #panels-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--panel-gap) 0;
      gap: var(--panel-gap);
    }

    /* Each panel is positioned so bubbles can overlay */
    .panel-wrapper {
      position: relative;
      width: 100%;
      max-width: var(--panel-max-width);
      min-height: 200px;
      /* Clip bubbles so they never overflow the panel */
      overflow: hidden;
    }

    .panel-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 2px;
    }

    /* =============================================
       MANGA BUBBLE SYSTEM
       ─────────────────────────────────────────────
       Each bubble = .bubble-container (positioned,
       carries drop-shadow filter) + .bubble-body
       (organic oval, white fill, text) + ::after
       pseudo-element (clip-path pointed tail).

       CSS filter:drop-shadow() on the container
       traces the combined alpha of body + tail,
       producing one seamless crisp outline.
       ============================================= */

    /* ── Container ──────────────────────────────── */
    .bubble-container {
      position: absolute;
      z-index: 10;
      max-width: 44%;
      pointer-events: none;
      user-select: none;
      /* Unified outline + lift shadow around body+tail */
      filter:
        drop-shadow(0 0 0 1.5px #1a1a1a)
        drop-shadow(0 2px 6px rgba(0, 0, 0, 0.38));
    }

    /* ── Oval body ────────────────────────────────
       border-radius uses 8 values (horizontal/
       vertical) to create an organic, slightly
       irregular oval instead of a perfect ellipse.
       ─────────────────────────────────────────── */
    .bubble-body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Arial', 'Helvetica Neue', sans-serif;
      font-size: clamp(0.63rem, 1.55vw, 0.87rem);
      font-weight: 600;
      line-height: 1.35;
      padding: 8px 13px;
      /* Organic irregular oval */
      border-radius: 58% 42% 52% 48% / 50% 56% 44% 52%;
    }

    /* ── Tail base (shared geometry) ────────────── */
    .bubble-container::after {
      content: '';
      position: absolute;
      background: #ffffff;
      width: 15px;
      height: 14px;
    }

    /* tail-left — sharp point aims down-left,
       tail emerges from the bottom-left of the oval */
    .bubble-container.tail-left::after {
      bottom: -12px;
      left: 20%;
      clip-path: polygon(15% 0%, 95% 0%, 0% 100%);
    }

    /* tail-right — point aims down-right */
    .bubble-container.tail-right::after {
      bottom: -12px;
      right: 20%;
      clip-path: polygon(5% 0%, 85% 0%, 100% 100%);
    }

    /* tail-top — point aims upward
       (bubble sits at bottom of panel, thinker above) */
    .bubble-container.tail-top::after {
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      clip-path: polygon(0% 100%, 100% 100%, 50% 0%);
    }

    /* tail-bottom — point aims downward
       (bubble at top of panel, character below) */
    .bubble-container.tail-bottom::after {
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
    }

    /* ── Thought bubble ──────────────────────────
       More circular, italic text. No tail.
       Uses direct border (not drop-shadow) so the
       three dot-trail circles stay visually
       independent with their own outlines.
       ─────────────────────────────────────────── */
    .bubble-container.thought {
      /* Override the filter: use border directly on
         body instead so dots stay separate */
      filter: none;
      max-width: 50%;
    }

    .bubble-container.thought::after {
      display: none; /* No tail on thought bubbles */
    }

    .thought-body {
      border: 1.5px solid #1a1a1a;
      border-radius: 50%;
      font-style: italic;
      padding: 10px 18px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    /* Three decreasing dots — classic manga thought trail.
       Positioned absolutely relative to container,
       trail extends downward from the bubble. */
    .thought-dot {
      position: absolute;
      background: #ffffff;
      border: 1.5px solid #1a1a1a;
      border-radius: 50%;
    }

    .dot-1 {
      width: 8px; height: 8px;
      bottom: -16px;
      left: 50%; transform: translateX(-50%);
    }

    .dot-2 {
      width: 5px; height: 5px;
      bottom: -25px;
      left: calc(50% + 5px);
    }

    .dot-3 {
      width: 3px; height: 3px;
      bottom: -32px;
      left: calc(50% + 9px);
    }

    /* ── "quiet" bubble modifier ─────────────────── */
    .bubble-container.quiet {
      max-width: 30%;
      opacity: 0.86;
    }

    .quiet .bubble-body {
      font-size: clamp(0.52rem, 1.1vw, 0.7rem);
      padding: 5px 10px;
    }

    /* Thinner, more delicate tail for quiet bubble */
    .bubble-container.quiet::after {
      width: 10px;
      height: 9px;
    }

    /* ── Starburst / impact bubble ────────────────
       clip-path polygon = 12-point starburst.
       drop-shadow on container traces the jagged
       outline automatically.
       ─────────────────────────────────────────── */
    .bubble-container.starburst {
      max-width: 52%;
      filter:
        drop-shadow(0 0 0 1.5px #1a1a1a)
        drop-shadow(0 3px 8px rgba(0, 0, 0, 0.45));
    }

    .bubble-container.starburst::after {
      display: none;
    }

    .starburst-body {
      /* 12-spike starburst via clip-path polygon.
         Alternates between outer (50%) and inner (28%)
         radius at 30° intervals. */
      clip-path: polygon(
        50%  0%,  61% 18%,  79%  8%,  74% 26%,
        93% 22%,  83% 39%, 100% 50%,  83% 61%,
        93% 78%,  74% 74%,  79% 92%,  61% 83%,
        50% 100%, 39% 83%,  21% 92%,  26% 74%,
         7% 78%,  17% 61%,   0% 50%,  17% 39%,
         7% 22%,  26% 26%,  21%  8%,  39% 18%
      );
      border-radius: 0;
      padding: 30px 22px;
      min-width: 95px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: clamp(1.3rem, 3.6vw, 1.95rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      text-align: center;
      transform: rotate(-4deg); /* slight tilt for energy */
    }

    /* =============================================
       POSITION HELPERS
       Named after compass positions on the panel.
       All values are % so they scale with the image.
       ============================================= */

    .pos-top-left    { top: 5%; left: 3%; }
    .pos-top-right   { top: 5%; right: 3%; }
    .pos-top-center  { top: 5%; left: 50%; transform: translateX(-50%); }
    .pos-mid-left    { top: 38%; left: 3%; }
    .pos-mid-right   { top: 38%; right: 3%; }
    .pos-mid-center  { top: 42%; left: 50%; transform: translateX(-50%); }
    .pos-bot-left    { bottom: 6%; left: 3%; }
    .pos-bot-right   { bottom: 6%; right: 3%; }
    .pos-bot-center  { bottom: 6%; left: 50%; transform: translateX(-50%); }

    /* =============================================
       ENDING SCREEN
       ============================================= */
    #ending-screen {
      width: 100%;
      min-height: 100vh;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      padding: 40px 24px;
    }

    .ending-continued {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-style: italic;
      color: var(--text-primary);
      letter-spacing: 0.03em;
    }

    .ending-credit {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--text-soft);
      font-style: italic;
    }

    /* =============================================
       ERROR SCREEN
       ============================================= */
    #error-screen {
      display: none;
      width: 100%;
      min-height: 100vh;
      background-color: var(--bg-color);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      padding: 40px 24px;
    }

    .error-message {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: var(--text-soft);
      font-style: italic;
    }

    .error-link {
      color: var(--text-primary);
      font-size: 1rem;
      text-underline-offset: 4px;
    }

    /* =============================================
       RESPONSIVE
       ============================================= */
    @media (max-width: 760px) {
      .panel-wrapper,
      .panel-wrapper img {
        border-radius: 0;
      }

      /* Slightly larger bubbles on small screens for readability */
      .bubble-body {
        font-size: clamp(0.7rem, 3vw, 0.88rem);
      }
    }
  </style>
</head>

<body>

  <!-- Back button — always visible -->
  <a id="back-btn" href="./index.html" title="Return to home">&#8592;</a>

  <!-- ============================================
       ERROR SCREEN (shown if fetch fails)
       ============================================ -->
  <section id="error-screen">
    <p class="error-message">Chapter not found. Return home.</p>
    <a class="error-link" href="./index.html">← Back to index</a>
  </section>

  <!-- ============================================
       OPENING TITLE SCREEN
       ============================================ -->
  <section id="title-screen">
    <div class="title-content">
      <h1 class="title-main" id="title-main-text">Loading…</h1>
      <p class="title-sub" id="title-sub-text"></p>
      <button class="begin-btn" onclick="beginReading()">Begin Reading</button>
    </div>
  </section>

  <!-- ============================================
       PANELS SECTION
       Panels and bubbles are injected by JS
       ============================================ -->
  <section id="panels-section"></section>

  <!-- ============================================
       ENDING SCREEN
       ============================================ -->
  <section id="ending-screen">
    <p class="ending-continued">To be continued…</p>
    <p class="ending-credit">Made with love for Leah.</p>
  </section>


  <script>
    /* =============================================
       CONFIG — edit all key values here
       ============================================= */
    const CONFIG = {
      bgColor:          '#0d0d0d',
      panelMaxWidth:    720,          // px
      panelGap:         20,           // px
      particleCount:    50,
      fadeInDuration:   600,          // ms — for scroll-in animation
      fadeInThreshold:  0.15,         // 0–1 — how much of panel must be visible
      shimmerPanel:     12,           // panel number that gets shimmer effect
      sparkleSpeed:     1.2,          // relative multiplier for particles
      overlayOpacity:   0.45,         // title screen cover overlay
    };

    /* =============================================
       RENDER DIALOGUE BUBBLES
       Reads DIALOGUE_DATA and calls the appropriate
       builder for each bubble type, then appends
       the result to the correct .panel-wrapper.
       ============================================= */
    function renderDialogue(DIALOGUE_DATA) {
      document.querySelectorAll('.panel-wrapper').forEach(wrapper => {
        const panelNum = parseInt(wrapper.dataset.panel, 10);
        const bubbles  = DIALOGUE_DATA[panelNum];
        if (!bubbles || bubbles.length === 0) return;

        bubbles.forEach(b => {
          let el;
          if (b.modifier === 'dramatic') {
            el = buildStarburstBubble(b);
          } else if (b.type === 'thought') {
            el = buildThoughtBubble(b);
          } else {
            el = buildSpeechBubble(b);
          }
          wrapper.appendChild(el);
        });
      });
    }

    /* ─── Speech bubble ─────────────────────────
       Container carries drop-shadow outline.
       ::after (via CSS tail-* class) is the tail.
       ─────────────────────────────────────────── */
    function buildSpeechBubble(b) {
      const container = document.createElement('div');
      const cls = ['bubble-container', 'speech'];
      if (b.tail)      cls.push('tail-' + b.tail);
      if (b.modifier)  cls.push(b.modifier);
      if (b.position)  cls.push(b.position);
      container.className = cls.join(' ');
      if (b.character) container.dataset.character = b.character;

      const body = document.createElement('div');
      body.className = 'bubble-body';
      body.textContent = b.text;
      container.appendChild(body);
      return container;
    }

    /* ─── Thought bubble ────────────────────────
       Rounder oval, italic text, no tail.
       Three decreasing-size dot circles trail
       downward from the bubble toward the thinker.
       ─────────────────────────────────────────── */
    function buildThoughtBubble(b) {
      const container = document.createElement('div');
      const cls = ['bubble-container', 'thought'];
      if (b.modifier) cls.push(b.modifier);
      if (b.position) cls.push(b.position);
      container.className = cls.join(' ');
      if (b.character) container.dataset.character = b.character;

      const body = document.createElement('div');
      body.className = 'bubble-body thought-body';
      body.textContent = b.text;
      container.appendChild(body);

      // Three dot trail
      for (let i = 1; i <= 3; i++) {
        const dot = document.createElement('span');
        dot.className = 'thought-dot dot-' + i;
        container.appendChild(dot);
      }
      return container;
    }

    /* ─── Starburst bubble ───────────────────────
       clip-path 12-point starburst polygon.
       drop-shadow on container traces jagged edge
       for a crisp spiked outline automatically.
       ─────────────────────────────────────────── */
    function buildStarburstBubble(b) {
      const container = document.createElement('div');
      const cls = ['bubble-container', 'starburst'];
      if (b.position) cls.push(b.position);
      container.className = cls.join(' ');
      if (b.character) container.dataset.character = b.character;

      const body = document.createElement('div');
      body.className = 'bubble-body starburst-body';
      body.textContent = b.text;
      container.appendChild(body);
      return container;
    }

    /* =============================================
       BEGIN READING — smooth scroll to panel 1
       ============================================= */
    function beginReading() {
      const section = document.querySelector('#panels-section');
      if (section) section.scrollIntoView({ behavior: 'smooth' });
    }

    /* =============================================
       SHOW ERROR
       ============================================= */
    function showError() {
      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('panels-section').style.display = 'none';
      document.getElementById('ending-screen').style.display = 'none';
      const err = document.getElementById('error-screen');
      err.style.display = 'flex';
    }

    /* =============================================
       DYNAMIC CHAPTER LOADER
       ============================================= */
    (async function init() {
      const params  = new URLSearchParams(window.location.search);
      const chapter = params.get('chapter') || '01';
      const chapterDir = './chapters/chapter-' + chapter;
      const metaPath   = chapterDir + '/meta.json';

      let meta;
      try {
        const res = await fetch(metaPath);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        meta = await res.json();
      } catch (e) {
        showError();
        return;
      }

      // ── Document title ───────────────────────────
      document.title = meta.title || 'Webtoon Reader';

      // ── Title screen text ────────────────────────
      document.getElementById('title-main-text').textContent = meta.title || '';
      document.getElementById('title-sub-text').textContent  = meta.subtitle || '';

      // ── Cover image (background on title screen) ──
      if (meta.coverImage) {
        document.getElementById('title-screen').style.backgroundImage =
          'url("' + chapterDir + '/' + meta.coverImage + '")';
      }

      // ── Build panel wrappers ─────────────────────
      const panelsSection = document.getElementById('panels-section');
      const panelCount    = meta.panelCount || 0;

      for (let i = 1; i <= panelCount; i++) {
        const num = String(i).padStart(2, '0');
        const wrapper = document.createElement('div');
        wrapper.className   = 'panel-wrapper';
        wrapper.dataset.panel = String(i);

        const img = document.createElement('img');
        img.src = chapterDir + '/panels/panel_' + num + '.png';
        img.alt = 'Panel ' + i;

        wrapper.appendChild(img);
        panelsSection.appendChild(wrapper);
      }

      // ── Convert meta.json dialogue to DIALOGUE_DATA ─
      // meta.json uses "panel_1" string keys; DIALOGUE_DATA uses numeric keys
      const DIALOGUE_DATA = {};
      if (meta.dialogue) {
        for (const [key, bubbles] of Object.entries(meta.dialogue)) {
          // key is "panel_1", "panel_2", etc.
          const num = parseInt(key.replace('panel_', ''), 10);
          DIALOGUE_DATA[num] = bubbles;
        }
      }

      // ── Render all bubbles ───────────────────────
      renderDialogue(DIALOGUE_DATA);
    })();
  </script>

</body>
</html>
