<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lulu &amp; Bagel — Adventures of a very full life.</title>

  <style>
    /* =============================================
       RESET & BASE
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: Georgia, 'Times New Roman', serif;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* =============================================
       SPARKLE CANVAS — fixed behind everything
       ============================================= */
    #sparkle-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* All page content sits above canvas */
    header, main, footer {
      position: relative;
      z-index: 1;
    }

    /* =============================================
       HEADER
       ============================================= */
    header {
      text-align: center;
      padding: 60px 24px 48px;
    }

    .series-title {
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.02em;
      line-height: 1.15;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.7);
    }

    .series-tagline {
      margin-top: 12px;
      font-size: clamp(0.95rem, 2.2vw, 1.2rem);
      font-style: italic;
      color: rgba(255, 255, 255, 0.6);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
    }

    .header-divider {
      margin: 24px auto 0;
      width: 120px;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );
      border: none;
    }

    /* =============================================
       MAIN — CHAPTER GRID
       ============================================= */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    #chapter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 900px;
      align-items: start;
    }

    /* =============================================
       CHAPTER CARD — shared base
       ============================================= */
    .chapter-card {
      background-color: #1a1a1a;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    /* ── Available card interactive states ───────── */
    .chapter-card.available {
      cursor: pointer;
    }

    .chapter-card.available:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
    }

    /* ── Coming-soon card: no hover effects ─────── */
    .chapter-card.coming-soon {
      opacity: 0.7;
      cursor: default;
    }

    /* ── Image area (top ~60% of card) ──────────── */
    .card-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-cover {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .chapter-card.available:hover .card-cover {
      transform: scale(1.02);
      filter: brightness(0.85);
    }

    /* Placeholder for coming-soon (no image) */
    .card-placeholder {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #111111;
      overflow: hidden;
    }

    /* Shimmer sweep animation */
    .card-placeholder::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 25%,
        rgba(255, 255, 255, 0.045) 50%,
        transparent 75%
      );
      background-size: 200% 100%;
      animation: shimmer-sweep 2.6s linear infinite;
    }

    @keyframes shimmer-sweep {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Chapter badge (top-left of image) */
    .chapter-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 3px 10px;
      background-color: rgba(0, 0, 0, 0.58);
      color: #ffffff;
      font-family: 'Arial', 'Helvetica Neue', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      border-radius: 50px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      text-transform: uppercase;
    }

    /* ── Card body (text + button) ───────────────── */
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 16px 20px;
      flex: 1;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
      line-height: 1.2;
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
    }

    .card-desc {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.45);
      font-family: 'Arial', 'Helvetica Neue', sans-serif;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Muted text for coming-soon cards */
    .chapter-card.coming-soon .card-title,
    .chapter-card.coming-soon .card-subtitle,
    .chapter-card.coming-soon .card-desc {
      opacity: 0.6;
    }

    /* ── "Read Now" button ───────────────────────── */
    .read-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px 0;
      font-family: Georgia, serif;
      font-size: 0.88rem;
      font-style: italic;
      color: #ffffff;
      background-color: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      letter-spacing: 0.03em;
    }

    .read-btn:hover {
      background-color: rgba(255, 255, 255, 0.14);
    }

    /* ── "Coming Soon" badge (replaces button) ───── */
    .coming-soon-badge {
      margin-top: 14px;
      width: 100%;
      padding: 10px 0;
      font-family: 'Arial', 'Helvetica Neue', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      background-color: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      text-align: center;
    }

    /* =============================================
       FOOTER
       ============================================= */
    footer {
      text-align: center;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .footer-heart {
      display: inline-block;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.55);
      animation: heartbeat 2s ease-in-out infinite;
      line-height: 1;
    }

    @keyframes heartbeat {
      0%   { transform: scale(1); }
      14%  { transform: scale(1.18); }
      28%  { transform: scale(1); }
      42%  { transform: scale(1.12); }
      56%  { transform: scale(1); }
      100% { transform: scale(1); }
    }

    .footer-credit {
      font-size: 0.85rem;
      font-style: italic;
      color: rgba(255, 255, 255, 0.38);
    }

    /* =============================================
       RESPONSIVE — mobile first
       ============================================= */
    @media (max-width: 600px) {
      #chapter-grid {
        grid-template-columns: 1fr;
      }

      .series-title {
        font-size: clamp(2rem, 10vw, 3rem);
      }

      header {
        padding: 48px 20px 36px;
      }
    }
  </style>
</head>

<body>

  <!-- Sparkle particle canvas -->
  <canvas id="sparkle-canvas"></canvas>

  <!-- ============================================
       HEADER
       ============================================ -->
  <header>
    <h1 class="series-title">Lulu &amp; Bagel</h1>
    <p class="series-tagline">Adventures of a very full life.</p>
    <hr class="header-divider" />
  </header>

  <!-- ============================================
       CHAPTER GRID
       ============================================ -->
  <main>
    <div id="chapter-grid"></div>
  </main>

  <!-- ============================================
       FOOTER
       ============================================ -->
  <footer>
    <span class="footer-heart">&#10084;</span>
    <p class="footer-credit">Made with love for Leah.</p>
  </footer>


  <script>
    /* =============================================
       CHAPTERS DATA
       To add a new chapter: add one object here.
       Zero other changes needed.
       ============================================= */
    const CHAPTERS = [
      {
        number: "01",
        title: "A Day at Home",
        subtitle: "Chapter 1",
        description: "Bagel steals dropped food. Lulu conquers the roof. A tiny fairy watches from the windowsill.",
        cover: "./chapters/chapter-01/cover.png",
        status: "available"
      },
      {
        number: "02",
        title: "Coming Soon",
        subtitle: "Chapter 2",
        description: "A new adventure is on its way...",
        cover: null,
        status: "coming-soon"
      }
    ];

    /* =============================================
       BUILD CHAPTER GRID
       ============================================= */
    function buildGrid() {
      const grid = document.getElementById('chapter-grid');

      CHAPTERS.forEach(ch => {
        const card = document.createElement('article');
        card.className = 'chapter-card ' + ch.status;

        if (ch.status === 'available') {
          card.addEventListener('click', () => {
            window.location.href = './reader.html?chapter=' + ch.number;
          });
        }

        // ── Image area ─────────────────────────────
        const imageWrap = document.createElement('div');
        imageWrap.className = 'card-image-wrap';

        if (ch.cover) {
          const img = document.createElement('img');
          img.className = 'card-cover';
          img.src = ch.cover;
          img.alt = ch.title + ' cover';
          imageWrap.appendChild(img);
        } else {
          const placeholder = document.createElement('div');
          placeholder.className = 'card-placeholder';
          imageWrap.appendChild(placeholder);
        }

        const badge = document.createElement('span');
        badge.className = 'chapter-badge';
        badge.textContent = 'Ch. ' + parseInt(ch.number, 10);
        imageWrap.appendChild(badge);

        card.appendChild(imageWrap);

        // ── Card body ──────────────────────────────
        const body = document.createElement('div');
        body.className = 'card-body';

        const title = document.createElement('h2');
        title.className = 'card-title';
        title.textContent = ch.title;
        body.appendChild(title);

        const subtitle = document.createElement('p');
        subtitle.className = 'card-subtitle';
        subtitle.textContent = ch.subtitle;
        body.appendChild(subtitle);

        const desc = document.createElement('p');
        desc.className = 'card-desc';
        desc.textContent = ch.description;
        body.appendChild(desc);

        if (ch.status === 'available') {
          const btn = document.createElement('button');
          btn.className = 'read-btn';
          btn.textContent = 'Read Now';
          btn.addEventListener('click', e => {
            e.stopPropagation(); // card click already navigates
            window.location.href = './reader.html?chapter=' + ch.number;
          });
          body.appendChild(btn);
        } else {
          const csb = document.createElement('div');
          csb.className = 'coming-soon-badge';
          csb.textContent = 'Coming Soon';
          body.appendChild(csb);
        }

        card.appendChild(body);
        grid.appendChild(card);
      });
    }

    /* =============================================
       SPARKLE PARTICLE SYSTEM
       Canvas-based floating particles.
       Each particle: small circle, rises upward,
       fades in and out over its lifetime.
       ============================================= */
    (function initSparkles() {
      const canvas = document.getElementById('sparkle-canvas');
      const ctx    = canvas.getContext('2d');
      const COUNT  = 50;
      const particles = [];

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      window.addEventListener('resize', resize);
      resize();

      function randomParticle(fromBottom) {
        return {
          x:        Math.random() * canvas.width,
          y:        fromBottom ? canvas.height + Math.random() * 40
                               : Math.random() * canvas.height,
          r:        0.8 + Math.random() * 1.8,       // radius px
          speed:    0.3 + Math.random() * 0.7,        // px per frame upward
          drift:    (Math.random() - 0.5) * 0.4,      // horizontal sway
          alpha:    0,
          maxAlpha: 0.25 + Math.random() * 0.4,
          life:     0,
          maxLife:  220 + Math.random() * 180,        // frames
        };
      }

      // Seed particles spread across the screen
      for (let i = 0; i < COUNT; i++) {
        particles.push(randomParticle(false));
        // Stagger life so they don't all spawn at once
        particles[i].life = Math.random() * particles[i].maxLife;
      }

      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p, i) => {
          p.life++;

          // Fade in first 20% of life, fade out last 20%
          const progress  = p.life / p.maxLife;
          const fadePhase = 0.2;
          if (progress < fadePhase) {
            p.alpha = (progress / fadePhase) * p.maxAlpha;
          } else if (progress > 1 - fadePhase) {
            p.alpha = ((1 - progress) / fadePhase) * p.maxAlpha;
          } else {
            p.alpha = p.maxAlpha;
          }

          // Move upward with gentle horizontal drift
          p.y -= p.speed;
          p.x += p.drift;

          // Draw
          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle   = '#ffffff';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          // Respawn when lifetime ends
          if (p.life >= p.maxLife) {
            particles[i] = randomParticle(true);
          }
        });

        requestAnimationFrame(tick);
      }

      tick();
    })();

    /* =============================================
       INIT
       ============================================= */
    buildGrid();
  </script>

</body>
</html>
